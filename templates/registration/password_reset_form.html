{% extends 'base.html' %}

{% block title %}Reinitialiser le mot de passe | SRIS{% endblock %}

{% block content %}
<div class="card shadow-sm" style="width:min(100%, 460px);">
    <div class="card-body p-4">
        <h1 class="h4 mb-3">Reinitialisation du mot de passe</h1>
        <p class="text-muted">Saisissez votre email. En mode developpement, le lien sera affiche dans la console Django.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">Envoyer le lien</button>
        </form>
</div>
</div>
{% endblock %}
