{% extends 'base.html' %}

{% block title %}Nouveau mot de passe | SRIS{% endblock %}

{% block content %}
<div class="card shadow-sm" style="width:min(100%, 460px);">
    <div class="card-body p-4">
        <h1 class="h4 mb-3">Choisir un nouveau mot de passe</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">Mettre a jour</button>
        </form>
</div>
</div>
{% endblock %}
